[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cloudwright-ai-cli"
dynamic = ["version"]
description = "CLI for Cloudwright architecture intelligence"
requires-python = ">=3.12"
license = "MIT"
authors = [{name = "Xavier Puspus"}]
readme = "README.md"
keywords = ["cloud", "cli", "architecture", "terraform"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "cloudwright-ai>=0.1.0,<1",
    "typer>=0.21,<1",
    "rich>=13.9,<15",
]

[project.scripts]
cloudwright = "cloudwright_cli.main:app"

[project.urls]
Homepage = "https://github.com/xmpuspus/cloudwright"
Repository = "https://github.com/xmpuspus/cloudwright"
Issues = "https://github.com/xmpuspus/cloudwright/issues"
Changelog = "https://github.com/xmpuspus/cloudwright/blob/main/CHANGELOG.md"

[tool.hatch.version]
path = "cloudwright_cli/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["cloudwright_cli"]
