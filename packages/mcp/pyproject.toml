[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cloudwright-ai-mcp"
dynamic = ["version"]
description = "MCP server for Cloudwright architecture intelligence"
requires-python = ">=3.12"
license = "MIT"
authors = [{name = "Xavier Puspus"}]
readme = "README.md"
keywords = ["cloud", "mcp", "architecture", "claude", "model-context-protocol"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Code Generators",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "cloudwright-ai>=0.3.0,<1",
    "mcp>=1.12,<2",
]

[project.urls]
Homepage = "https://github.com/xmpuspus/cloudwright"
Repository = "https://github.com/xmpuspus/cloudwright"
Issues = "https://github.com/xmpuspus/cloudwright/issues"
Changelog = "https://github.com/xmpuspus/cloudwright/blob/main/CHANGELOG.md"

[tool.hatch.version]
path = "cloudwright_mcp/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["cloudwright_mcp"]
